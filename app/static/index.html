<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>招标文件一键生成投标文件</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #eaf0fb 0%, #f5f7ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 36px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.10);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* 上传区 */
    .upload-zone {
      width: 100%;
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      background: #f0f7ff;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #2563eb;
      background: #dbeafe;
    }
    .upload-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .upload-label {
      font-size: 1rem;
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 6px;
    }
    .upload-hint {
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .file-chosen {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #2563eb;
      font-weight: 600;
      word-break: break-all;
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(90deg, #1d4ed8 0%, #2563eb 100%);
      color: #fff;
    }
    .btn-success {
      background: linear-gradient(90deg, #059669 0%, #10b981 100%);
      color: #fff;
    }

    /* 进度 / 状态 */
    .status-box {
      width: 100%;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .status-box.info  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .status-box.ok    { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .status-box.error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 进度条 */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="logo">📄</div>
  <h1>招标文件一键投标</h1>
  <p class="subtitle">上传招标文件，AI 自动生成完整投标响应文件（Word）</p>

  <div class="card">

    <!-- 上传区 -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc" />
      <div class="upload-icon">☁️</div>
      <div class="upload-label">点击或拖拽上传招标文件</div>
      <div class="upload-hint">支持 PDF、Word（.docx）格式</div>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <!-- 进度条 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- 状态消息 -->
    <div class="status-box" id="statusBox"></div>

    <!-- 生成按钮 -->
    <button class="btn btn-primary" id="btnGenerate" onclick="startGenerate()">
      ✨ 一键生成投标文件
    </button>

    <!-- 下载按钮（生成后出现） -->
    <a id="downloadLink" style="display:none; width:100%; text-decoration:none;">
      <button class="btn btn-success" style="width:100%;">
        ⬇ 下载投标文件（Word）
      </button>
    </a>

  </div>

  <div class="footer">AI 生成的模板文件，请根据实际情况完善公司信息后使用</div>

<script>
const fileInput  = document.getElementById('fileInput');
const fileChosen = document.getElementById('fileChosen');
const statusBox  = document.getElementById('statusBox');
const btnGen     = document.getElementById('btnGenerate');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const downloadLink = document.getElementById('downloadLink');
const uploadZone   = document.getElementById('uploadZone');

// 拖拽高亮
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
['dragleave','drop'].forEach(ev => uploadZone.addEventListener(ev, () => uploadZone.classList.remove('drag-over')));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; updateFileName(); }
});

fileInput.addEventListener('change', updateFileName);

function updateFileName() {
  const f = fileInput.files[0];
  fileChosen.textContent = f ? `已选择：${f.name}` : '';
  // 重置下载按钮
  downloadLink.style.display = 'none';
  setStatus('', '');
}

function setStatus(type, msg) {
  if (!type) { statusBox.style.display = 'none'; return; }
  statusBox.className = `status-box ${type}`;
  statusBox.style.display = 'block';
  statusBox.innerHTML = msg;
}

function setProgress(pct) {
  progressWrap.style.display = pct > 0 ? 'block' : 'none';
  progressBar.style.width = pct + '%';
}

// 模拟进度（因为后端是同步阻塞，用伪进度动画给用户反馈）
let progressTimer = null;
function startFakeProgress() {
  let pct = 0;
  progressTimer = setInterval(() => {
    // 缓慢爬升到 90%，剩余留给真实完成
    if (pct < 90) {
      pct += (90 - pct) * 0.035;
      setProgress(pct);
    }
  }, 400);
}
function stopFakeProgress(success) {
  clearInterval(progressTimer);
  setProgress(success ? 100 : 0);
  if (!success) progressWrap.style.display = 'none';
}

async function startGenerate() {
  const f = fileInput.files[0];
  if (!f) {
    setStatus('error', '⚠️ 请先选择招标文件');
    return;
  }

  const ext = f.name.split('.').pop().toLowerCase();
  if (!['pdf', 'docx', 'doc'].includes(ext)) {
    setStatus('error', '⚠️ 仅支持 PDF 或 Word（.docx）格式');
    return;
  }

  // UI 状态
  btnGen.disabled = true;
  downloadLink.style.display = 'none';
  setStatus('info', '<span class="spinner"></span>正在解析招标文件并生成投标文件，请耐心等待（约 1–3 分钟）…');
  startFakeProgress();

  try {
    const formData = new FormData();
    formData.append('file', f);

    const resp = await fetch('/api/tender/one-click', {
      method: 'POST',
      body: formData,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || resp.statusText);
    }

    // 将返回的 blob 转为本地链接
    const blob = await resp.blob();
    const url = URL.createObjectURL(blob);

    // 从 Content-Disposition 或自动命名文件
    let filename = '投标文件.docx';
    const cd = resp.headers.get('Content-Disposition') || '';
    const m = cd.match(/filename\*?=(?:UTF-8'')?["']?([^"';\n]+)/i);
    if (m) filename = decodeURIComponent(m[1].trim());

    stopFakeProgress(true);
    setStatus('ok', '✅ 投标文件生成成功！点击下方按钮下载。');

    downloadLink.href = url;
    downloadLink.download = filename;
    downloadLink.style.display = 'block';

  } catch (err) {
    stopFakeProgress(false);
    setStatus('error', `❌ 生成失败：${err.message}`);
  } finally {
    btnGen.disabled = false;
  }
}
</script>
</body>
</html>
