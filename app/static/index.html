<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>招标文件一键生成投标文件</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #eaf0fb 0%, #f5f7ff 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .logo {
      font-size: 2rem;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a3a6b;
      margin-bottom: 6px;
      letter-spacing: 1px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #64748b;
      margin-bottom: 36px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(37,99,235,0.10);
      padding: 40px 48px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    /* 上传区 */
    .upload-zone {
      width: 100%;
      border: 2px dashed #93c5fd;
      border-radius: 12px;
      background: #f0f7ff;
      padding: 32px 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      position: relative;
    }
    .upload-zone:hover, .upload-zone.drag-over {
      border-color: #2563eb;
      background: #dbeafe;
    }
    .upload-zone input[type=file] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }
    .upload-icon { font-size: 2.4rem; margin-bottom: 10px; }
    .upload-label {
      font-size: 1rem;
      font-weight: 600;
      color: #1e40af;
      margin-bottom: 6px;
    }
    .upload-hint {
      font-size: 0.78rem;
      color: #94a3b8;
    }
    .file-chosen {
      margin-top: 10px;
      font-size: 0.85rem;
      color: #2563eb;
      font-weight: 600;
      word-break: break-all;
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 1px;
      transition: opacity .2s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .55; cursor: not-allowed; }

    .btn-primary {
      background: linear-gradient(90deg, #1d4ed8 0%, #2563eb 100%);
      color: #fff;
    }
    .btn-success {
      background: linear-gradient(90deg, #059669 0%, #10b981 100%);
      color: #fff;
    }

    /* 进度 / 状态 */
    .status-box {
      width: 100%;
      border-radius: 10px;
      padding: 14px 18px;
      font-size: 0.88rem;
      font-weight: 500;
      text-align: center;
      display: none;
    }
    .status-box.info  { background: #eff6ff; color: #1d4ed8; border: 1px solid #bfdbfe; }
    .status-box.ok    { background: #ecfdf5; color: #065f46; border: 1px solid #6ee7b7; }
    .status-box.error { background: #fef2f2; color: #991b1b; border: 1px solid #fca5a5; }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid currentColor;
      border-top-color: transparent;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* 进度条 */
    .progress-wrap {
      width: 100%;
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #2563eb, #60a5fa);
      border-radius: 99px;
      width: 0%;
      transition: width .4s ease;
    }

    .live-progress {
      width: 100%;
      display: none;
      border-radius: 12px;
      padding: 14px 16px;
      background: #f8fbff;
      border: 1px solid #dbeafe;
    }
    .live-progress-title {
      font-size: 0.78rem;
      color: #64748b;
      margin-bottom: 8px;
    }
    .live-progress-current {
      font-size: 1rem;
      font-weight: 700;
      color: #1e3a8a;
      margin-bottom: 8px;
    }
    .live-progress-sub {
      font-size: 0.82rem;
      color: #64748b;
      margin-bottom: 12px;
    }
    .step-track {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .step-pill {
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 0.78rem;
      background: #e2e8f0;
      color: #64748b;
      transition: all .2s ease;
    }
    .step-pill.active {
      background: #dbeafe;
      color: #1d4ed8;
      font-weight: 700;
    }
    .step-pill.done {
      background: #dcfce7;
      color: #047857;
    }
    .step-pill.error {
      background: #fee2e2;
      color: #b91c1c;
    }

    .footer {
      margin-top: 28px;
      font-size: 0.75rem;
      color: #cbd5e1;
    }
  </style>
</head>
<body>

  <div class="logo">📄</div>
  <h1>招标文件一键投标</h1>
  <p class="subtitle">上传招标文件，AI 自动生成完整投标响应文件（Word）</p>

  <div class="card">

    <!-- 上传区 -->
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="fileInput" accept=".pdf,.docx,.doc" />
      <div class="upload-icon">☁️</div>
      <div class="upload-label">点击或拖拽上传招标文件</div>
      <div class="upload-hint">支持 PDF、Word（.docx）格式</div>
      <div class="file-chosen" id="fileChosen"></div>
    </div>

    <!-- 进度条 -->
    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- 状态消息 -->
    <div class="status-box" id="statusBox"></div>

    <!-- 实时进度 -->
    <div class="live-progress" id="liveProgress">
      <div class="live-progress-title">当前进度</div>
      <div class="live-progress-current" id="liveProgressCurrent">正在准备开始…</div>
      <div class="live-progress-sub" id="liveProgressSub">系统会持续刷新当前处理阶段。</div>
      <div class="step-track" id="stepTrack"></div>
    </div>

    <!-- 生成按钮 -->
    <button class="btn btn-primary" id="btnGenerate" onclick="startGenerate()">
      ✨ 一键生成投标文件
    </button>

    <!-- 下载按钮（生成后出现） -->
    <a id="downloadLink" style="display:none; width:100%; text-decoration:none;">
      <button class="btn btn-success" style="width:100%;">
        ⬇ 下载投标文件（Word）
      </button>
    </a>

  </div>

  <div class="footer">AI 生成的模板文件，请根据实际情况完善公司信息后使用</div>

<script>
const fileInput  = document.getElementById('fileInput');
const fileChosen = document.getElementById('fileChosen');
const statusBox  = document.getElementById('statusBox');
const btnGen     = document.getElementById('btnGenerate');
const progressWrap = document.getElementById('progressWrap');
const progressBar  = document.getElementById('progressBar');
const downloadLink = document.getElementById('downloadLink');
const uploadZone   = document.getElementById('uploadZone');
const liveProgress = document.getElementById('liveProgress');
const liveProgressCurrent = document.getElementById('liveProgressCurrent');
const liveProgressSub = document.getElementById('liveProgressSub');
const stepTrack = document.getElementById('stepTrack');

const STEP_ORDER = ['queued', 'extracting', 'parsing', 'structuring', 'generating', 'building', 'completed'];
const STEP_LABELS = {
  queued: '准备开始',
  extracting: '文档解析',
  parsing: '需求抽取',
  structuring: '条款整理',
  generating: '章节生成',
  building: '输出文档',
  completed: '处理完成',
  error: '处理失败',
};

let pollTimer = null;
let activeJobId = '';

// 拖拽高亮
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
['dragleave','drop'].forEach(ev => uploadZone.addEventListener(ev, () => uploadZone.classList.remove('drag-over')));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; updateFileName(); }
});

fileInput.addEventListener('change', updateFileName);

function updateFileName() {
  const f = fileInput.files[0];
  fileChosen.textContent = f ? `已选择：${f.name}` : '';
  resetRunState();
}

function setStatus(type, msg) {
  if (!type) { statusBox.style.display = 'none'; return; }
  statusBox.className = `status-box ${type}`;
  statusBox.style.display = 'block';
  statusBox.innerHTML = msg;
}

function setProgress(pct) {
  progressWrap.style.display = pct > 0 ? 'block' : 'none';
  progressBar.style.width = pct + '%';
}

function resetRunState() {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  activeJobId = '';
  downloadLink.style.display = 'none';
  setStatus('', '');
  setProgress(0);
  liveProgress.style.display = 'none';
  stepTrack.innerHTML = '';
}

function renderStepTrack(stepCode, status) {
  const activeIndex = STEP_ORDER.indexOf(stepCode);
  stepTrack.innerHTML = STEP_ORDER.map((code, index) => {
    let cls = 'step-pill';
    if (status === 'error' && index === Math.max(activeIndex, 0)) cls += ' error';
    else if (status === 'completed' || (activeIndex > -1 && index < activeIndex)) cls += ' done';
    else if (code === stepCode) cls += ' active';
    return `<span class="${cls}">${STEP_LABELS[code]}</span>`;
  }).join('');
}

function updateLiveProgress(data) {
  liveProgress.style.display = 'block';
  liveProgressCurrent.textContent = data.message || '正在处理中…';
  liveProgressSub.textContent = `当前阶段：${data.step_label || STEP_LABELS[data.step_code] || '处理中'} · 任务ID：${data.job_id}`;
  renderStepTrack(data.step_code, data.status);
}

async function startGenerate() {
  const f = fileInput.files[0];
  if (!f) {
    setStatus('error', '⚠️ 请先选择招标文件');
    return;
  }

  const ext = f.name.split('.').pop().toLowerCase();
  if (!['pdf', 'docx', 'doc'].includes(ext)) {
    setStatus('error', '⚠️ 仅支持 PDF 或 Word（.docx）格式');
    return;
  }

  // UI 状态
  btnGen.disabled = true;
  resetRunState();
  setStatus('info', '<span class="spinner"></span>正在创建生成任务…');

  try {
    const formData = new FormData();
    formData.append('file', f);

    const resp = await fetch('/api/tender/one-click/start', {
      method: 'POST',
      body: formData,
    });

    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ detail: resp.statusText }));
      throw new Error(err.detail || resp.statusText);
    }

    const job = await resp.json();
    activeJobId = job.job_id;
    setProgress(job.progress || 1);
    updateLiveProgress(job);
    setStatus('info', `<span class="spinner"></span>${job.message || '正在处理中…'}`);
    await pollJobStatus(activeJobId);
    pollTimer = setInterval(() => {
      pollJobStatus(activeJobId).catch(handlePollingError);
    }, 1200);

  } catch (err) {
    setStatus('error', `❌ 生成失败：${err.message}`);
    btnGen.disabled = false;
  } finally {
    if (!activeJobId) btnGen.disabled = false;
  }
}

function handlePollingError(err) {
  if (pollTimer) {
    clearInterval(pollTimer);
    pollTimer = null;
  }
  setStatus('error', `❌ 状态刷新失败：${err.message}`);
  btnGen.disabled = false;
}

async function pollJobStatus(jobId) {
  const resp = await fetch(`/api/tender/one-click/status/${jobId}`, { cache: 'no-store' });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({ detail: resp.statusText }));
    throw new Error(err.detail || resp.statusText);
  }

  const data = await resp.json();
  setProgress(data.progress || 0);
  updateLiveProgress(data);

  if (data.status === 'completed') {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    setStatus('ok', '✅ 投标文件生成成功！点击下方按钮下载。');
    downloadLink.href = data.download_url;
    downloadLink.download = data.filename || '投标文件.docx';
    downloadLink.style.display = 'block';
    btnGen.disabled = false;
    return;
  }

  if (data.status === 'error') {
    if (pollTimer) {
      clearInterval(pollTimer);
      pollTimer = null;
    }
    setStatus('error', `❌ ${data.error || data.message || '生成失败'}`);
    btnGen.disabled = false;
    return;
  }

  setStatus('info', `<span class="spinner"></span>${data.message || '正在处理中…'}`);
}
</script>
</body>
</html>
